<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Vacancy</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    form {
        background: #ffffff;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        border-radius: 8px;
        padding: 20px;
        width: 100%;
        max-width: 400px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    td {
        padding: 10px;
        vertical-align: middle;
    }

    td:first-child {
        text-align: right;
        font-weight: bold;
        color: #333;
    }

    input[type="text"] {
        width: calc(100% - 20px);
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 14px;
    }

    input[type="submit"] {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        transition: background-color 0.3s ease;
    }

    input[type="submit"]:hover {
        background-color: #0056b3;
    }

    div {
        text-align: center;
        margin-top: 10px;
    }
</style>
</head>
<body>
<form id="form1" name="form1" method="post" action="/edit_vacancy_post">
  <table>
    <tr>
      <td>Vacancy</td>
      <td>
        <input type="text" name="textfield1" value="{{ val.vacancy }}" />
      </td>
    </tr>
    <tr>
      <td>No. of Vacancies</td>
      <td>
        <input type="text" name="textfield3" value="{{ val.no_of_vacancy }}" />
      </td>
    </tr>
    <tr>
      <td>Details</td>
      <td>
        <input type="text" name="textfield4" value="{{ val.details }}" />
      </td>
    </tr>
    <tr>
      <td colspan="2">
        <div>
          <input type="submit" name="Submit" value="Edit" />
        </div>
      </td>
    </tr>
  </table>
</form>
</body>
</html>
