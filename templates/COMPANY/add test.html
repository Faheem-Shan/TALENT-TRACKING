<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Test</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Arial', sans-serif;
        background-color: #f9f9f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    form {
        background: #ffffff;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
        padding: 30px;
        width: 100%;
        max-width: 400px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 20px;
    }

    td {
        padding: 12px;
        font-size: 14px;
        color: #555;
    }

    label {
        font-weight: bold;
    }

    input[type="text"],
    select {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 14px;
        margin-top: 8px;
        margin-bottom: 16px;
    }

    input[type="submit"] {
        background-color: #28a745;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        width: 100%;
        transition: background-color 0.3s ease;
    }

    input[type="submit"]:hover {
        background-color: #218838;
    }

    td input[type="text"],
    td select {
        margin-top: 5px;
    }

    .form-title {
        text-align: center;
        font-size: 18px;
        margin-bottom: 20px;
        color: #333;
    }

</style>
</head>
<body>
<form id="form1" name="form1" method="post" action="/add_test_post">
  <div class="form-title">Add Test</div>
  <table>
    <tr>
      <td>Vacancy</td>
      <td>
        <select name="select">
            {% for i in val %}
                <option value="{{ i.id }}">{{ i.vacancy }}</option>
            {% endfor %}
        </select>
      </td>
    </tr>
    <tr>
      <td>Test</td>
      <td><input type="text" name="textfield2" /></td>
    </tr>
    <tr>
      <td>Description</td>
      <td><input type="text" name="textfield3" /></td>
    </tr>
    <tr>
      <td colspan="2">
        <div align="center">
          <input type="submit" name="Submit" value="Add" />
        </div>
      </td>
    </tr>
  </table>
</form>
</body>
</html>
