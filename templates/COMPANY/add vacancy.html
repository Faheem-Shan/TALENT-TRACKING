<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Vacancy</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .form-container {
    background-color: #ffffff;
    width: 100%;
    max-width: 400px;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    padding: 20px;
  }

  .form-header {
    text-align: center;
    margin-bottom: 20px;
    font-size: 20px;
    font-weight: bold;
    color: #4CAF50;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  td {
    padding: 10px 5px;
    font-size: 14px;
    vertical-align: top;
  }

  td:first-child {
    font-weight: bold;
    color: #555555;
    text-align: right;
    padding-right: 10px;
  }

  td:last-child {
    text-align: left;
  }

  input[type="text"] {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    border: 1px solid #ddd;
    border-radius: 5px;
    box-sizing: border-box;
    transition: border-color 0.3s ease;
  }

  input[type="text"]:focus {
    border-color: #4CAF50;
    outline: none;
  }

  .form-footer {
    text-align: center;
    margin-top: 20px;
  }

  input[type="submit"] {
    background-color: #4CAF50;
    color: white;
    border: none;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: bold;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease;
  }

  input[type="submit"]:hover {
    background-color: #45a049;
  }
</style>
</head>

<body>
<div class="form-container">
  <div class="form-header">Add Vacancy</div>
  <form id="form1" name="form1" method="post" action="/company_add_vacancy_post">
    <table>
      <tr>
        <td>Vacancy</td>
        <td><input type="text" name="textfield" /></td>
      </tr>
      <tr>
        <td>No. of Vacancies</td>
        <td><input type="text" name="textfield3" /></td>
      </tr>
      <tr>
        <td>Details</td>
        <td><input type="text" name="textfield4" /></td>
      </tr>
    </table>
    <div class="form-footer">
      <input type="submit" name="Submit" value="Add" />
    </div>
  </form>
</div>
</body>
</html>
