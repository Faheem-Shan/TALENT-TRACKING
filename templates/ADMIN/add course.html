{% extends 'ADMIN/index.html' %}
{% block body %}
<title>Add Course</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: #f5f5f5;
    margin: 0;
    padding: 20px;
    color: #333;
  }

  form {
    max-width: 600px;
    margin: 40px auto;
    background: #ffffff;
    border-radius: 8px;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
    padding: 30px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  td {
    padding: 12px;
    font-size: 14px;
    color: #555;
  }

  td:first-child {
    text-align: right;
    font-weight: bold;
    color: #333;
    width: 30%;
  }

  input[type="text"] {
    width: 100%;
    padding: 10px;
    font-size: 14px;
    border: 1px solid #ddd;
    border-radius: 5px;
    outline: none;
    box-sizing: border-box;
    transition: all 0.3s ease;
  }

  input[type="text"]:focus {
    border-color: #6a82fb;
    background-color: #f3faff;
  }

  input[type="submit"] {
    background-color: #6a82fb;
    color: white;
    border: none;
    cursor: pointer;
    padding: 12px 20px;
    font-weight: bold;
    border-radius: 5px;
    width: 100%;
    transition: background-color 0.3s ease;
  }

  input[type="submit"]:hover {
    background-color: #4f70d2;
  }

  .submit-container {
    text-align: center;
  }

  @media (max-width: 768px) {
    form {
      padding: 20px;
    }

    td {
      font-size: 12px;
    }

    input[type="text"], input[type="submit"] {
      font-size: 14px;
    }
  }
</style>
</head>

<body>
<form id="form1" name="form1" method="post" action="/admin_add_course_post">
  <table>
    <tr>
      <td>Course Name</td>
      <td>
        <input type="text" required name="textfield" placeholder="Enter course name" />
      </td>
    </tr>
    <tr>
      <td>Course Details</td>
      <td>
        <input type="text" required name="textfield2" placeholder="Enter course details" />
      </td>
    </tr>
    <tr>
      <td colspan="2" class="submit-container">
        <input type="submit" name="Submit" value="Add Course" />
      </td>
    </tr>
  </table>
</form>
</body>
{% endblock %}
