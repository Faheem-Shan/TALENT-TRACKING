<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Rating</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }
        .stars {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .stars i {
            font-size: 30px;
            color: #ccc;
            cursor: pointer;
            transition: color 0.3s;
        }
        .stars i.active {
            color: gold;
        }
        .btn {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            background: #218838;
        }
        input[name="rating"] {
            display: none; /* Hide the rating input field */
        }
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
            height: 100px;
            resize: vertical;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Rate Us</h2>
    <form id="ratingForm" action="/sendfeedback_action/{{ id }}" method="post">
        <div class="stars">
            <i class="fa fa-star" data-index="1"></i>
            <i class="fa fa-star" data-index="2"></i>
            <i class="fa fa-star" data-index="3"></i>
            <i class="fa fa-star" data-index="4"></i>
            <i class="fa fa-star" data-index="5"></i>
        </div>
        <input type="hidden" name="rating" id="ratingValue" required>

        <textarea name="feedback" placeholder="Leave your feedback here..."></textarea>

        <button type="submit" class="btn">Send</button>
    </form>
</div>

<script>
    let stars = document.querySelectorAll(".stars i");
    let ratingInput = document.getElementById("ratingValue");

    stars.forEach((star, index) => {
        star.addEventListener("click", function() {
            let selectedRating = index + 1;
            ratingInput.value = selectedRating;
            updateStars(selectedRating);
        });

        star.addEventListener("mouseover", function() {
            updateStars(index + 1);
        });

        star.addEventListener("mouseleave", function() {
            updateStars(ratingInput.value || 0);
        });
    });

    function updateStars(rating) {
        stars.forEach((star, index) => {
            star.classList.toggle("active", index < rating);
        });
    }

    document.getElementById("ratingForm").addEventListener("submit", function(event) {
        if (!ratingInput.value) {
            alert("Please select a rating before submitting.");
            event.preventDefault();
        }
    });
</script>

</body>
</html>
